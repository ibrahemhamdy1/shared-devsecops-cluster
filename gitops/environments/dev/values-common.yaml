# =============================================================================
# Development Environment - Common Values
# =============================================================================
# These values apply to ALL applications deployed in the dev environment.
# App-specific overrides go in gitops/apps/dev/{app-name}/values.yaml
# =============================================================================

# -- Reduced replicas for cost savings in dev
replicaCount: 1

# -- Minimal resources for dev workloads
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# -- Autoscaling disabled in dev
autoscaling:
  enabled: false

# -- No PDB needed in dev
podDisruptionBudget:
  enabled: false

# -- Ingress defaults for dev environment
ingress:
  annotations:
    alb.ingress.kubernetes.io/group.name: dev-apps
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz

# -- Node selector (uncomment to pin dev workloads to specific nodes)
# nodeSelector:
#   environment: dev

# -- Common dev environment variables
# env:
#   - name: LOG_LEVEL
#     value: "debug"
