# =============================================================================
# Sample Application - Production Environment Values
# =============================================================================
# Layer 3: App-specific overrides for production
# Merge order: chart defaults → production common → this file
# =============================================================================

image:
  # -- Replace ACCOUNT_ID with your AWS account ID
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sample-app
  # -- ALWAYS pin image tags in production (must match tested staging tag)
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 3

# -- Production resource overrides (higher than common defaults)
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# -- Autoscaling for production
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

# -- PDB for production availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# -- Ingress for production sample app
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: prod-apps
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
  hosts:
    - host: sample-app.internal.example.com
      paths:
        - path: /
          pathType: Prefix

# -- Production environment variables
env:
  - name: LOG_LEVEL
    value: "warn"
  - name: ENVIRONMENT
    value: "production"
  - name: ENABLE_DEBUG_ENDPOINTS
    value: "false"

# -- Production-specific config
configMap:
  enabled: true
  data:
    app.conf: |
      environment=production
      debug=false
      log_format=json

# -- ServiceAccount (for Pod Identity / IRSA)
serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/sample-app-prod
