{{/*
=============================================================================
PodDisruptionBudget - Ensures minimum availability during disruptions
Only created when podDisruptionBudget.enabled is true.
Protects against voluntary disruptions (node drains, upgrades, etc.)
=============================================================================
*/}}
{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "base-app.fullname" . }}
  labels:
    {{- include "base-app.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "base-app.selectorLabels" . | nindent 6 }}
{{- end }}
