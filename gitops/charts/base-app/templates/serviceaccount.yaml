{{/*
=============================================================================
ServiceAccount - Identity for pods to interact with the Kubernetes API
Only created when serviceAccount.create is true.
Supports IRSA (IAM Roles for Service Accounts) via annotations.
=============================================================================
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "base-app.serviceAccountName" . }}
  labels:
    {{- include "base-app.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
