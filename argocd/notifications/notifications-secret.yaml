apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-notifications-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  # Slack Bot Token
  # Retrieve from: https://api.slack.com/apps
  # Scopes required: chat:write, incoming-webhook
  # IMPORTANT: In production, use External Secrets or Sealed Secrets to manage this
  slack-token: "xoxb-YOUR-SLACK-BOT-TOKEN-HERE"

  # Microsoft Teams Webhook URL
  # Create from: https://outlook.webhook.office.com/webhookb2/...
  # IMPORTANT: In production, use External Secrets or Sealed Secrets to manage this
  teams-webhook-url: "https://outlook.webhook.office.com/webhookb2/YOUR-TEAMS-WEBHOOK-URL-HERE"

---
# IMPORTANT SECURITY NOTE:
# 
# This secret file contains placeholder credentials. In production environments:
#
# 1. DO NOT commit actual credentials to Git
# 2. Use one of the following approaches:
#
#    a) External Secrets Operator (ESO)
#       - Store secrets in AWS Secrets Manager, HashiCorp Vault, etc.
#       - ESO automatically syncs them to Kubernetes
#       - Example: https://external-secrets.io/
#
#    b) Sealed Secrets
#       - Encrypt secrets with a cluster-specific key
#       - Only the cluster can decrypt them
#       - Example: https://github.com/bitnami-labs/sealed-secrets
#
#    c) AWS Secrets Manager + IAM
#       - Store secrets in AWS Secrets Manager
#       - Use IRSA (IAM Roles for Service Accounts) for access
#       - Retrieve at runtime
#
#    d) HashiCorp Vault
#       - Centralized secret management
#       - Dynamic secret generation
#       - Audit logging
#
# 3. Rotate credentials regularly
# 4. Use least-privilege IAM policies
# 5. Enable audit logging for secret access
#
# To retrieve Slack token:
# 1. Go to https://api.slack.com/apps
# 2. Select your app
# 3. Navigate to "OAuth & Permissions"
# 4. Copy the "Bot User OAuth Token" (starts with xoxb-)
# 5. Required scopes: chat:write, incoming-webhook
#
# To retrieve Teams webhook URL:
# 1. Go to your Teams channel
# 2. Click "..." (More options)
# 3. Select "Connectors"
# 4. Search for "Incoming Webhook"
# 5. Configure and copy the webhook URL
#
# To apply this secret:
# kubectl apply -f notifications-secret.yaml
#
# To verify the secret was created:
# kubectl get secret argocd-notifications-secret -n argocd
# kubectl describe secret argocd-notifications-secret -n argocd
